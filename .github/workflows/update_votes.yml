name: Update live votes
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pandas pyarrow python-dotenv
      - name: Run live fetcher
        run: |
          cd src
          python ep_live_fetcher.py
      - name: Commit and push new data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/recent/
          git diff --staged --quiet || git commit -m "Auto-update live votes $(date +%Y-%m-%d)"
          git push
